services:
  - type: web
    name: medicoo-admin
    env: ruby
    plan: free
    # Updated: This compiles your CSS/JS assets during build
    buildCommand: bundle install; bundle exec rails assets:precompile; bundle exec rails assets:clean
    # Updated: This safely runs migrations right before booting up the server
    startCommand: bundle exec rails db:migrate; bundle exec puma -C config/puma.rb
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_MASTER_KEY
        sync: false
      - key: APP_HOST
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: medicoo-admin-db
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY
        generateValue: true
      - key: ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY
        generateValue: true
      - key: ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT
        generateValue: true
      - key: LICENSE_RESPONSE_SECRET
        generateValue: true

databases:
  - name: medicoo-admin-db
    plan: free
    region: oregon

